<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OneSpot">
  <!-- spot = alvo de precisão: anel + marcas de mira + ponto central laranja -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#E8ECF1" stroke-width="3.5"/>
  <!-- marcas de mira -->
  <line x1="32" y1="4"  x2="32" y2="14" stroke="#E8ECF1" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="60" stroke="#E8ECF1" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="4"  y1="32" x2="14" y2="32" stroke="#E8ECF1" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="60" y2="32" stroke="#E8ECF1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- ponto central -->
  <circle cx="32" cy="32" r="7" fill="#F18F2F"/>
</svg>
